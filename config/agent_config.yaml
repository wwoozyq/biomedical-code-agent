# 智能体配置文件

# 基础配置
agent:
  name: "BiomedicalCodeAgent"
  version: "2.0.0"
  max_iterations: 8
  timeout_seconds: 300

# LLM 配置（阿里通义千问）
llm:
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  model: "qwen3-max"          # 可选: qwen-turbo, qwen-plus, qwen-max, qwen3-max
  temperature: 0.0
  max_tokens: 4096
  # api_key 通过环境变量 DASHSCOPE_API_KEY 设置，不要写在配置文件里

# 执行环境配置
execution:
  sandbox_dir: "./sandbox"
  data_dir: "./data"
  output_dir: "./output"
  log_dir: "./logs"

# BioDSBench 配置
biodsbench:
  data_root: "../biodsbench_data"
  output_dir: "./benchmark_output"
  
# 动作空间配置
actions:
  request_info:
    enabled: true
    timeout: 30
    supported_formats: ["csv", "json", "sqlite", "db"]
    
  terminal:
    enabled: true
    timeout: 30
    allowed_commands: ["pip", "ls", "cat", "head", "tail", "wc"]
    restricted_commands: ["rm", "sudo", "chmod"]
    
  code_execution:
    enabled: true
    timeout: 60
    supported_languages: ["python", "sql"]
    python:
      allowed_imports: 
        - "pandas"
        - "numpy"
        - "matplotlib"
        - "seaborn"
        - "sklearn"
        - "scipy"
        - "lifelines"
        - "sqlite3"
      restricted_imports: ["os.system", "subprocess", "eval", "exec"]
      
  debugging:
    enabled: true
    max_suggestions: 5
    
# 任务配置
tasks:
  data_analysis:
    default_timeout: 300
    required_outputs: ["summary_stats", "visualization"]
    validation_methods: ["file_exists", "assertion", "statistical_test"]
    
  prediction:
    default_timeout: 600
    required_outputs: ["predictions", "metrics"]
    validation_methods: ["prediction_file", "metrics_threshold", "model_file"]
    
  sql_query:
    default_timeout: 120
    required_outputs: ["query_results"]
    validation_methods: ["result_comparison", "schema_check", "row_count"]

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_rotation: true
  max_file_size: "10MB"
  backup_count: 5